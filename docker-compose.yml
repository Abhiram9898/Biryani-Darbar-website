services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: ./apps/api/.env
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
