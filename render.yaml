services:
  - type: web
    name: biryani-darbar
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run seed && npm run start -w apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: biryani-darbar
